[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
preDeployCommand = "npm run db:migrate:prod"
startCommand = "node dist/railway-start.cjs"
healthcheckPath = "/v1/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# Default for API service; agent workers override via service name (aethon-agent-*).
[variables]
AETHON_RUNTIME = "api"
