# Agent worker services — set Root Directory to `backend` on Railway.
# In each agent service: Settings → Deploy → Start Command → npm run start:agent
# Or link this file if Railway supports service-specific config paths.

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start:agent"
restartPolicyType = "ON_FAILURE"
