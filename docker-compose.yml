services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - API_PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile.agent
    env_file:
      - ./backend/.env
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - agents
